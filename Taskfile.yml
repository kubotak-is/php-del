version: '3'

tasks:
  install:
    desc: Install dependencies with the minimum supported PHP version
    cmds:
      - docker compose run --rm php82 composer install

  test:
    desc: Run tests with the minimum supported PHP version
    cmds:
      - docker compose run --rm php82 composer test

  analyse:
    desc: Run PHPStan with the minimum supported PHP version
    cmds:
      - docker compose run --rm php82 composer analyse

  install-php82:
    cmds:
      - docker compose run --rm php82 composer install

  test-php82:
    cmds:
      - docker compose run --rm php82 composer test

  install-php83:
    cmds:
      - docker compose run --rm php83 composer install

  test-php83:
    cmds:
      - docker compose run --rm php83 composer test

  install-php84:
    cmds:
      - docker compose run --rm php84 composer install

  test-php84:
    cmds:
      - docker compose run --rm php84 composer test

  install-php85:
    cmds:
      - docker compose run --rm php85 composer install

  test-php85:
    cmds:
      - docker compose run --rm php85 composer test

  test-all:
    desc: Run the test suite on every supported PHP version
    cmds:
      - docker compose run --rm php82 composer test
      - docker compose run --rm php83 composer test
      - docker compose run --rm php84 composer test
      - docker compose run --rm php85 composer test
